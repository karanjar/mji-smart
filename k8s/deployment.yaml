apiVersion: apps/v1
kind: Deployment
metadata:
  name: mjismart-go-engine
  namespace: mjismart
spec:
  replicas: 5
  selector:
    matchLabels:
      app: mjismart-go-engine
  template:
    metadata:
      labels:
        app: mjismart-go-engine
    spec:
      containers:
      - name: go-engine
        image: mjismart/go-engine:latest
        ports:
        - containerPort: 3000
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: host
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mjismart-go-engine
  namespace: mjismart
spec:
  selector:
    app: mjismart-go-engine
  ports:
  - port: 80
    targetPort: 3000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mjismart-go-engine-hpa
  namespace: mjismart
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mjismart-go-engine
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80